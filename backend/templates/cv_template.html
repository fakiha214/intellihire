<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    @page { size: a4; margin: 1.5cm 1.7cm; }
    body { font-family: "Times New Roman", Times, serif; font-size: 10.5pt; color: #000000; }

    .name { text-align: center; font-size: 19pt; font-weight: bold; margin: 0; }
    .contact { text-align: center; font-size: 10pt; margin: 5px 0 2px 0; }
    .rule { border-bottom: 1.2px solid #000000; margin: 8px 0 4px 0; }

    h2.section {
      text-align: center;
      font-size: 12pt;
      font-weight: bold;
      letter-spacing: 1px;
      border-top: 1px solid #000000;
      border-bottom: 1px solid #000000;
      padding: 3px 0;
      margin: 15px 0 8px 0;
    }

    p { margin: 4px 0; text-align: justify; line-height: 1.35; }

    table.row { width: 100%; margin: 9px 0 0 0; }
    table.row td.l { text-align: left; }
    table.row td.r { text-align: right; }
    table.row.org td { font-weight: bold; }
    table.row.role td { font-style: italic; }

    ul { margin: 4px 0 6px 0; }
    li { margin: 2px 0; line-height: 1.32; }
    strong { font-weight: bold; }
  </style>
</head>
<body>
  <div class="name">{{ name }}</div>
  {% if contact %}<div class="contact">{{ contact }}</div>{% endif %}
  <div class="rule"></div>
  {{ body|safe }}
</body>
</html>
