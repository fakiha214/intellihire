server {
    listen 80;
    server_name intellihire.duckdns.org;

    # Let's Encrypt webroot renewal challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name intellihire.duckdns.org;
    client_max_body_size 25M;

    ssl_certificate     /etc/letsencrypt/live/intellihire.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/intellihire.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # API + uploaded files are served by the backend container
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /uploads/ {
        proxy_pass http://backend:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
